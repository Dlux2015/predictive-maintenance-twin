[pytest]
# ---------------------------------------------------------------------------
# Predictive Maintenance Digital Twin — pytest configuration
# ---------------------------------------------------------------------------

# Discover tests only in the tests/ directory
testpaths = tests

# Show verbose output by default
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers (avoids PytestUnknownMarkWarning)
markers =
    spark: tests that require a local PySpark installation
    integration: tests that require live AWS credentials or Delta Lake

# Minimum Python version guard
minversion = 7.0

# Import mode: importlib avoids sys.path manipulation issues on Windows
# and plays nicely with the etl/ and ingestion/ packages at the project root.
# Requires pytest >= 6.0.
pythonpath = .
